name: checks

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Web build
        run: npm run build
      - name: Mobile TypeScript
        run: npm run mobile:typecheck
      - name: Production WebSocket smoke
        run: npm run smoke:server:production
      - name: Expo production config
        working-directory: apps/mobile
        env:
          APP_VARIANT: preview
          EXPO_PUBLIC_ROOM_SERVER_MODE: production
          EXPO_PUBLIC_ROOM_SERVER_URL: wss://rooms.example.test/ws
        run: npx expo config --type public
